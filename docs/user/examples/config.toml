# Harness Code 用户级 TOML v1 模板。
# 将此文件复制到 ~/.harness/config.toml；不要提交 API Key、Token 或认证 Header。

[config]
version = 1

# 当前内核只执行 default_profile 指向的一个 Profile。
# 多 Profile 选择将在 ZC-019 中提供。
[models]
default_profile = "enterprise"

[models.profiles.enterprise]
provider = "openai-compatible"
model = "your-enterprise-coding-model"
base_url = "https://gateway.example.internal/v1"
api_key_env = "HARNESS_API_KEY"
# 仅当上述环境变量缺失或空白时使用。推荐保留环境变量方式。
# 启用后必须执行 `chmod 600 ~/.harness/config.toml`，且不得把该文件提交到仓库。
# api_key = "your-enterprise-gateway-key"
timeout_seconds = 120
max_retries = 2
# 模型输入窗口；未填写时使用 128000。显式值不得低于 16384。
context_window_tokens = 128000

# 固定 Header 只能包含非秘密值；Authorization、Cookie 和 API Key 必须放入 headers_env。
[models.profiles.enterprise.headers]
X-Client-Name = "harness-code"

[models.profiles.enterprise.headers_env]
X-Enterprise-Tenant = "HARNESS_TENANT"

[approval]
mode = "default"

[execution]
backend = "local"

# Sidecar 内共享 AgentRuntime 的有界缓存。相同稳定配置的多个 thread 复用一张图；
# 淘汰只会释放内存中的图和连接，不会删除 SQLite 中的消息、PromptEpoch 或 checkpoint。
[runtime_pool]
# 同时缓存的 Runtime Profile 数，范围 1-64。
max_profiles = 8
# 空闲 Runtime 的淘汰等待时间，范围 60-86400 秒。
idle_ttl_seconds = 1800
# sidecar 退出时单个 Runtime 等待资源关闭的时间，范围 1-120 秒。
close_timeout_seconds = 15
# true 时默认 Profile 不参与 LRU/TTL 淘汰；只建议固定的单项目交互环境使用。
pin_default_profile = false

# 计划中（ZC-008）：企业远端 Sandbox Provider。
# 将 backend 改为 "remote" 前，必须先完成对应任务并由企业提供 factory。
# [execution.remote]
# provider = "corp"
# factory = "harness_corp_sandbox:create_backend"
# working_directory = "/workspace"
#
# [execution.remote.params]
# project = "your-enterprise-project"

# 计划中（ZC-042）：TUI 主题、编辑器与终端偏好。
# [ui]
# theme = "harness-dark"

# Skill 使用目录约定，不需要配置区段：项目 `.harness/skills/` 默认启用，
# 用户可通过 `harness skills disable <canonical-id>` 记录下一次会话的停用偏好。

# 计划中（ZC-015）：同步子 Agent 声明与范围。
# [agents]

# 计划中（ZC-005）：可信 MCP Server 配置。
# [mcp]

# 计划中（ZC-021）：企业审计与遥测配置。
# [telemetry]

# 计划中（ZC-025）：更新通道和版本策略。
# [updates]

# 计划中（ZC-039）：生命周期 Hook；不得在项目配置中自动执行。
# [hooks]

# 计划中（ZC-040）：本地 Extension 加载；需要来源隔离和工件信任。
# [extensions]

# 计划中（ZC-041）：Plugin 与企业插件源；不得自动下载或执行。
# [plugins]

# 计划中（ZC-038）：仅企业 managed TOML 可定义不可覆盖策略。
# [policy]
