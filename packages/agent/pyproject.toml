[project]
name = "za38-agent"
version = "0.1.0"
description = "za38 agent kernel — deepagents + LangChain + LangGraph"
requires-python = ">=3.11,<4.0"
dependencies = [
    "deepagents>=0.6.12",
    "langchain>=1.3.12,<2.0.0",
    "langchain-core>=1.4.9,<2.0.0",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "langchain-openai>=1.3.5,<2.0.0",
    "langchain-quickjs>=0.3.2,<0.4.0",
    "langchain-mcp-adapters>=0.3.0,<1.0.0",
    "jinja2>=3.1.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "langchain-tests>=1.1.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "e2e: requires a loopback-only mock OpenAI server",
]
