[project]
name = "za38-agent"
version = "0.1.0"
description = "za38 agent kernel — deepagents + LangChain + LangGraph"
requires-python = ">=3.11,<4.0"
dependencies = [
    "deepagents==0.6.8",
    "langchain==1.3.11",
    "langchain-core==1.4.8",
    "langgraph-checkpoint-sqlite==3.0.3",
    "langchain-openai==1.3.3",
    "langchain-mcp-adapters==0.2.1",
    "PyYAML==6.0.3",
    "jinja2==3.1.6",
    "httpx==0.28.1",
    "pydantic==2.12.5",
]

[project.optional-dependencies]
test = [
    "pytest==9.0.3",
    "pytest-asyncio==1.4.0",
]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["harness_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "e2e: requires a loopback-only mock OpenAI server",
]
